# ============================================================
#  EquipLink Backend – Development Profile
# ============================================================

spring:
  datasource:
    url: ${DATABASE_URL:jdbc:h2:mem:equiplink;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
    username: ${DATABASE_USERNAME:sa}
    password: ${DATABASE_PASSWORD:}
    driver-class-name: ${DATABASE_DRIVER:org.h2.Driver}
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  mail:
    host: ${SMTP_HOST:smtp.gmail.com}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME:attendancesystemcec@gmail.com}
    password: ${SMTP_PASSWORD:jfpkwlutdusnvhnq}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

app:
  jwt:
    secret: ${JWT_SECRET:equiplink-default-secret-key-change-in-production-env}
  frontend:
    url: ${FRONTEND_URL:http://localhost:3000}

logging:
  level:
    com.equiplink: DEBUG
    org.springframework.security: INFO
